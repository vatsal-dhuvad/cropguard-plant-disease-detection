services:
  - type: web
    name: cropguard-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: bash scripts/start-backend.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FLASK_SERVICE_URL
        value: http://localhost:5000
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: SESSION_COOKIE_SAMESITE
        value: None
